{% extends "base.html" %}
{% block title %}Admin Forgot Password{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="card shadow-sm mx-auto" style="max-width: 500px;">
    <div class="card-body p-4">
      <h3 class="mb-3">Admin Forgot Password</h3>
      <p class="text-muted">Enter your admin email address to receive a reset code.</p>

      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-3">
          <label class="form-label">Admin Email</label>
          <input type="email" name="email" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Send Reset Code</button>
      </form>

      <div class="mt-3 text-center">
        <a href="{{ url_for('admin_login') }}">Back to Admin Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
