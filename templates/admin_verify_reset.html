{% extends "base.html" %}
{% block title %}Verify Reset Code{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="card shadow-sm mx-auto" style="max-width: 500px;">
    <div class="card-body p-4">
      <h3 class="mb-3">Verify Reset Code</h3>
      <p class="text-muted">Enter the reset code sent to your email.</p>

      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-3">
          <label class="form-label">Reset Code</label>
          <input type="text" name="reset_code" class="form-control" maxlength="6" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Verify Code</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
